      <stop offset="0" stop-color="#1c1d24"/>
      <stop offset="0.36" stop-color="#15161c"/>
      <stop offset="1" stop-color="#101116"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
