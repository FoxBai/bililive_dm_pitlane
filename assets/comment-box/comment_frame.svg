  <text x="1150" y="190" text-anchor="end" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="122" font-weight="900">RADIO</text>
  <rect x="28" y="247" width="1224" height="10" fill="#ffffff"/>
