# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  macos-native:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate macOS scripts
        run: bash -n scripts/build-app.sh scripts/smoke-app.sh scripts/package-dmg.sh
        working-directory: macos-native

      - name: Test macOS native app
        run: swift test
        working-directory: macos-native

      - name: Build macOS app bundle
        run: bash scripts/build-app.sh
        working-directory: macos-native

      - name: Package unsigned macOS DMG
        run: SKIP_CODESIGN=1 bash scripts/package-dmg.sh
        working-directory: macos-native

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitlaneDanmaku-macOS-dmg
          path: macos-native/dist/*.dmg

  build:

    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        configuration: [Release]
        platform: ["AnyCPU"]

    steps:
      - name: Install .Net 4.6.1
        shell: cmd
        run: choco install netfx-4.6.1-devpack -y
        
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Create directories
        shell: cmd
        run: |
          mkdir "${{ github.workspace }}\Bililive_dm\Win32"
          mkdir "${{ github.workspace }}\Bililive_dm\x64"

      - name: Restore NuGet packages
        run: nuget restore Bililive_dm.sln

      - name: Build wtf_lib
        run: |
          msbuild wtf_lib_builder/wtf_lib_builder.vcxproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform="${{ matrix.platform }}" `
            /m `
            /v:minimal

      - name: Build Bililive_dm
        run: |
          msbuild Bililive_dm/Bililive_dm.csproj `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform="${{ matrix.platform }}" `
            /m `
            /v:minimal
